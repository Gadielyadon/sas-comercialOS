<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0612a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b2a6e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>

  <!-- Rayo blanco centrado -->
  <path
    d="M57 12 L32 54 L47 54 L43 88 L68 46 L53 46 Z"
    fill="white"
    filter="url(#shadow)"
  />
</svg>
